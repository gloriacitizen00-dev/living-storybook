<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Nacimos para ser héroes</title>
  <style>
    body {
      background-color: #fff;
      color: #333;
      font-family: 'Helvetica', sans-serif;
      margin: 0;
      padding: 0;
    }
    .pagina {
      width: 100%;
      max-width: 900px;
      margin: auto;
      border-bottom: 2px solid #000;
      position: relative;
      background-color: #fff;
    }
    .titulo {
      text-align: center;
      font-size: 2em;
      color: gray;
      margin-top: 50px;
    }
    .manga-cuadro {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      padding: 20px;
      background-color: #f9f9f9;
    }
    .manga-cuadro img {
      width: 45%;
      border: 2px solid #000;
    }
    .texto {
      padding: 20px;
      font-size: 1em;
      color: #000;
      background-color: #fff;
      border-top: 1px solid #000;
    }
    footer {
      text-align: center;
      font-size: 0.9em;
      color: #555;
      margin-top: 20px;
      padding: 10px;
      border-top: 1px solid #000;
    }
  </style>
</head>
<body>

 <div class="pagina">
  <h1 class="titulo">Nacimos para ser héroes</h1>
  <div class="manga-cuadro">
    <img src="portada.png" alt="Portada">
  </div>
  <footer>Gloria Martínez — Página 1</footer>
</div>


 <div class="pagina">
  <h2 class="titulo">Nacimos para ser héroes</h2>
  <div class="manga-cuadro">
    <img src="cuadro1.png" alt="Cuadro 1">
    <img src="cuadro2.png" alt="Cuadro 2">
    <img src="cuadro3.png" alt="Cuadro 3">
    <img src="cuadro4.png" alt="Cuadro 4">
  </div>
  <div class="texto">
    <p>Aquí puedes escribir el diálogo o narración sin afectar las imágenes.</p>
  </div>
  <footer>Gloria Martínez — Página 2</footer>
</div>


</body>
</html>
